name: Build, Push, and Deploy
on:
  push:
    branches: [ "main" ]

permissions:
  contents: read
  packages: write

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.VPS_GHCR_PULL }}
      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ghcr.io/${{ github.repository }}:latest

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: Executing remote ssh commands
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.VPS_IP }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            # Login to GHCR on the VPS
            echo "${{ secrets.VPS_GHCR_PULL }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin
            # Pull latest image
            docker pull ghcr.io/${{ github.repository }}:latest
            # Stop and remove old container
            docker stop wtms || true
            docker rm wtms || true
            # Run new container (using the same settings as before)
            docker run -d \
              --name wtms \
              --network="host" \
              --restart unless-stopped \
              --env-file /root/app/.env \
              ghcr.io/${{ github.repository }}:latest